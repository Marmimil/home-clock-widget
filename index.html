<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Clock Widget</title>
  <style>
    :root {
      --bg: #d9e8f6;
      --text: #111111;
      --subtext: rgba(17, 17, 17, 0.78);
      --card-border: rgba(255, 255, 255, 0.65);
      --shadow: 0 10px 30px rgba(75, 102, 130, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 374px;
      height: 150px;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .widget {
      width: 374px;
      height: 150px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px 20px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .date {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--subtext);
      line-height: 1.2;
      white-space: nowrap;
    }

    .greeting {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--subtext);
      text-align: right;
      white-space: nowrap;
    }

    .clock-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-4px);
    }

    .clock {
      display: flex;
      align-items: baseline;
      justify-content: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
    }

    .main-time {
      font-size: 58px;
      font-weight: 500;
    }

    .seconds {
      font-size: 28px;
      font-weight: 500;
      margin-left: 4px;
      opacity: 0.88;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="top">
      <div class="date" id="date"></div>
      <div class="greeting" id="greeting"></div>
    </div>

    <div class="clock-wrap">
      <div class="clock" aria-label="current time">
        <span class="main-time" id="mainTime">00:00</span>
        <span class="seconds" id="seconds">00</span>
      </div>
    </div>
  </div>

  <script>
    const dateEl = document.getElementById('date');
    const greetingEl = document.getElementById('greeting');
    const mainTimeEl = document.getElementById('mainTime');
    const secondsEl = document.getElementById('seconds');

    const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function getTokyoParts() {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      });

      const parts = formatter.formatToParts(now);
      const map = {};
      for (const part of parts) {
        if (part.type !== 'literal') map[part.type] = part.value;
      }

      const year = Number(map.year);
      const month = Number(map.month);
      const day = Number(map.day);
      const hour = Number(map.hour);
      const minute = map.minute;
      const second = map.second;

      const weekdayIndex = new Date(`${map.year}-${map.month}-${map.day}T00:00:00+09:00`).getDay();
      const weekday = weekdays[weekdayIndex];

      return {
        year,
        month: map.month,
        day: map.day,
        hour,
        minute,
        second,
        weekday,
      };
    }

    function getGreeting(hour) {
      if (hour >= 5 && hour < 11) return 'Good morning';
      if (hour >= 11 && hour < 18) return 'Hello';
      return 'Good evening';
    }

    function render() {
      const { year, month, day, hour, minute, second, weekday } = getTokyoParts();
      dateEl.textContent = `${year}.${month}.${day} ${weekday}`;
      greetingEl.textContent = getGreeting(hour);
      mainTimeEl.textContent = `${String(hour).padStart(2, '0')}:${minute}`;
      secondsEl.textContent = `:${second}`;
    }

    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
