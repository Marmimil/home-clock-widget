<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Clock Widget</title>
  <style>
    :root {
      --bg: #e6f0fa;
      --text: #5b5b60;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 374px;
      height: 150px;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .widget {
      width: 374px;
      height: 150px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .time {
      font-size: 68px;
      font-weight: 400;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .date {
      font-size: 32px;
      font-weight: 400;
      line-height: 1;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="time" id="time">00:00:00</div>
    <div class="date" id="date">Fri Mar 27</div>
  </div>

  <script>
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');

    const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    function getTokyoParts() {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
      });

      const parts = formatter.formatToParts(now);
      const map = {};
      for (const part of parts) {
        if (part.type !== 'literal') map[part.type] = part.value;
      }

      const isoDate = `${map.year}-${map.month}-${map.day}`;
      const weekdayIndex = new Date(`${isoDate}T00:00:00+09:00`).getDay();
      const monthIndex = Number(map.month) - 1;

      return {
        hour: map.hour,
        minute: map.minute,
        second: map.second,
        weekday: weekdays[weekdayIndex],
        month: months[monthIndex],
        day: String(Number(map.day)),
      };
    }

    function render() {
      const { hour, minute, second, weekday, month, day } = getTokyoParts();
      timeEl.textContent = `${hour}:${minute}:${second}`;
      dateEl.textContent = `${weekday} ${month} ${day}`;
    }

    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
